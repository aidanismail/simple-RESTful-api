name: CI/CD Pipeline simple-RESTful-api

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Mengambil kode dari repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install

      - name: Menjalankan Unit Testing (CI)
        run: npm test

      - name: Menjalankan Security Scan (CS)
        run: npm audit --audit-level=high

      - name: Build Docker Image (CD)
        run: docker build -t simple-RESTful-api .
